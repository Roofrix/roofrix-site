<div class="pricing-page">

  <!-- Hero Section -->
  <section class="hero-section">
    <div class="blueprint-bg">
      <!-- Left blueprint decoration -->
      <svg class="blueprint-left" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 280L20 120L150 40L280 120" stroke="currentColor" stroke-width="1"/>
        <path d="M50 280L50 140L150 70L250 140L250 280" stroke="currentColor" stroke-width="0.8"/>
        <path d="M20 280L280 280" stroke="currentColor" stroke-width="1"/>
        <path d="M80 280L80 180" stroke="currentColor" stroke-width="0.6"/>
        <path d="M130 280L130 200" stroke="currentColor" stroke-width="0.6"/>
        <path d="M80 180L130 180L130 200L80 200Z" stroke="currentColor" stroke-width="0.6"/>
        <path d="M160 280L160 210L210 210L210 280" stroke="currentColor" stroke-width="0.6"/>
        <line x1="40" y1="160" x2="100" y2="160" stroke="currentColor" stroke-width="0.5" stroke-dasharray="4 3"/>
        <line x1="200" y1="160" x2="260" y2="160" stroke="currentColor" stroke-width="0.5" stroke-dasharray="4 3"/>
        <text x="60" y="155" fill="currentColor" font-size="8" opacity="0.6">232</text>
        <text x="220" y="155" fill="currentColor" font-size="8" opacity="0.6">180</text>
        <circle cx="150" cy="40" r="3" stroke="currentColor" stroke-width="0.5" fill="none"/>
        <line x1="20" y1="120" x2="280" y2="120" stroke="currentColor" stroke-width="0.3" stroke-dasharray="2 4"/>
      </svg>
      <!-- Right blueprint decoration -->
      <svg class="blueprint-right" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="30" y="60" width="240" height="200" stroke="currentColor" stroke-width="1"/>
        <path d="M30 60L150 10L270 60" stroke="currentColor" stroke-width="1"/>
        <rect x="60" y="120" width="60" height="60" stroke="currentColor" stroke-width="0.6"/>
        <rect x="180" y="120" width="60" height="60" stroke="currentColor" stroke-width="0.6"/>
        <line x1="60" y1="150" x2="120" y2="150" stroke="currentColor" stroke-width="0.3"/>
        <line x1="90" y1="120" x2="90" y2="180" stroke="currentColor" stroke-width="0.3"/>
        <line x1="180" y1="150" x2="240" y2="150" stroke="currentColor" stroke-width="0.3"/>
        <line x1="210" y1="120" x2="210" y2="180" stroke="currentColor" stroke-width="0.3"/>
        <rect x="120" y="180" width="60" height="80" stroke="currentColor" stroke-width="0.6"/>
        <path d="M120 220L150 200L180 220" stroke="currentColor" stroke-width="0.4"/>
        <line x1="30" y1="260" x2="270" y2="260" stroke="currentColor" stroke-width="0.3" stroke-dasharray="2 4"/>
        <text x="140" y="275" fill="currentColor" font-size="8" opacity="0.6">100</text>
        <line x1="280" y1="60" x2="280" y2="260" stroke="currentColor" stroke-width="0.5" stroke-dasharray="4 3"/>
        <text x="283" y="165" fill="currentColor" font-size="8" opacity="0.6">200</text>
      </svg>
      <div class="container">
        <div class="hero-icon">
          <svg width="48" height="32" viewBox="0 0 48 32" fill="none">
            <path d="M2 28L24 6L46 28" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 22L24 10L38 22" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
          </svg>
        </div>
        <h1 class="main-title">Simple, Transparent Pricing</h1>
        <p class="subtitle">Choose the plan that fits your measurement needs.</p>
      </div>
    </div>
  </section>

  <!-- Roof Plans -->
  <section class="plans-section">
    <div class="container">
      <h2 class="section-label">ROOF PLANS</h2>
      <div class="plans-grid">
        <div class="plan-card" *ngFor="let plan of roofPlans">
          <div class="card-illustration">
            <img src="assets/website/Home Page/roof.png" alt="Roof" />
            <ng-container *ngIf="plan.hasPdf">
              <span class="plus-sign">+</span>
              <div class="pdf-icon">
                <svg width="32" height="38" viewBox="0 0 32 38" fill="none">
                  <rect x="0.5" y="0.5" width="31" height="37" rx="3" fill="#e8f4fd" stroke="#3b82f6"/>
                  <rect x="6" y="25" width="20" height="8" rx="2" fill="#3b82f6"/>
                  <text x="16" y="32" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">PDF</text>
                  <path d="M8 8H24M8 13H20M8 18H22" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </div>
            </ng-container>
          </div>
          <h3 class="plan-name">{{ plan.name }}</h3>
          <div class="plan-price">${{ plan.price }}</div>
          <div class="plan-divider"></div>
          <ul class="plan-features">
            <li>
              <span class="check-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd" />
                </svg>
              </span>
              {{ plan.format }}
            </li>
            <li *ngIf="plan.hasPdf">
              <span class="check-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd" />
                </svg>
              </span>
              PDF Report Included
            </li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <!-- Divider -->
  <div class="section-divider">
    <div class="container">
      <hr />
    </div>
  </div>

  <!-- Wall Plans -->
  <section class="plans-section">
    <div class="container">
      <h2 class="section-label">WALL PLANS</h2>
      <div class="plans-grid">
        <div class="plan-card" *ngFor="let plan of wallPlans">
          <div class="card-illustration">
            <img src="assets/website/Home Page/wall.png" alt="Wall" />
            <ng-container *ngIf="plan.hasPdf">
              <span class="plus-sign">+</span>
              <div class="pdf-icon">
                <svg width="32" height="38" viewBox="0 0 32 38" fill="none">
                  <rect x="0.5" y="0.5" width="31" height="37" rx="3" fill="#e8f4fd" stroke="#3b82f6"/>
                  <rect x="6" y="25" width="20" height="8" rx="2" fill="#3b82f6"/>
                  <text x="16" y="32" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">PDF</text>
                  <path d="M8 8H24M8 13H20M8 18H22" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </div>
            </ng-container>
          </div>
          <h3 class="plan-name">{{ plan.name }}</h3>
          <div class="plan-price">${{ plan.price }}</div>
          <div class="plan-divider"></div>
          <ul class="plan-features">
            <li>
              <span class="check-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd" />
                </svg>
              </span>
              {{ plan.format }}
            </li>
            <li *ngIf="plan.hasPdf">
              <span class="check-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd" />
                </svg>
              </span>
              PDF Report Included
            </li>
            <li *ngIf="plan.wallLabel">
              <span class="check-icon">
                <svg viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd" />
                </svg>
              </span>
              {{ plan.wallLabel }}
            </li>
          </ul>
        </div>
      </div>
    </div>
  </section>

</div>
