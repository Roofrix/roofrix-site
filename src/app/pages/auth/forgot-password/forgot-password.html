<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Forgot Password?</h1>
      <p>Enter your email and we'll send you a reset link</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
      <!-- Error Message -->
      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Success Message -->
      <div class="success-alert" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.error]="hasError('email', 'required') || hasError('email', 'email')"
          autocomplete="email"
        />
        <span class="error-message" *ngIf="getErrorMessage('email')">
          {{ getErrorMessage('email') }}
        </span>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="submit-button"
        [disabled]="loading || successMessage"
      >
        <span *ngIf="!loading">Send Reset Link</span>
        <span *ngIf="loading">Sending...</span>
      </button>

      <!-- Back to Sign In -->
      <div class="auth-link">
        Remember your password?
        <a routerLink="/signin">Sign In</a>
      </div>
    </form>
  </div>
</div>
